<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Metodo CPOF</title>
  <link rel="stylesheet" href="assets/css/global.css">
</head>
<body>
  <main class="centered-page home-page">
    <section class="hero-panel">
      <h1 id="title-cpof" aria-label="Metodo C P O F">Metodo
        <span class="cpof" aria-hidden="true">
          <span class="cpof-letter">C</span>
          <span class="cpof-letter">P</span>
          <span class="cpof-letter">O</span>
          <span class="cpof-letter">F</span>
        </span>
      </h1>

      <p class="hint">Treine pelo celular ou computador. Toque em F2L para comecar.</p>

      <nav class="home-actions" role="navigation" aria-label="Navegacao principal">
        <button id="btn-f2l" class="card primary">F2L</button>
        <button id="btn-oll" class="card disabled" aria-disabled="true">OLL <small>Em breve</small></button>
        <button id="btn-pll" class="card disabled" aria-disabled="true">PLL <small>Em breve</small></button>
      </nav>
    </section>
  </main>

  <footer class="site-footer">Feito por Allan GHabriell.</footer>
  <script src="assets/js/main.js" defer></script>
</body>
</html>
