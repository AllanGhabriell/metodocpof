<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Método CPOF</title>
  <link rel="stylesheet" href="assets/css/global.css">
</head>
<body>
  <main class="centered-page">
    <h1 id="title-cpof" aria-label="Método C P O F">Método 
      <span class="cpof" aria-hidden="true">
        <span class="cpof-letter">C</span>
        <span class="cpof-letter">P</span>
        <span class="cpof-letter">O</span>
        <span class="cpof-letter">F</span>
      </span>
    </h1>

    <nav class="home-actions" role="navigation" aria-label="Navegação principal">
      <button id="btn-f2l" class="card primary">F2L</button>
      <button id="btn-oll" class="card disabled" aria-disabled="true">OLL <small>Em breve</small></button>
      <button id="btn-pll" class="card disabled" aria-disabled="true">PLL <small>Em breve</small></button>
    </nav>

    <p class="hint">Use no celular ou computador — toque em F2L para treinar.</p>
  </main>

  <script src="assets/js/main.js" defer></script>

</html>
